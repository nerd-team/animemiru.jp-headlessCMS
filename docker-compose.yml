# さくらのVPS 向け Docker Compose
# 使い方: cp .env.example .env → 値を編集 → docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-build-time-docker-secret-minimum-32-chars}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://animemiru.jp}
        NEXT_PUBLIC_OG_IMAGE: ${NEXT_PUBLIC_OG_IMAGE:-https://animemiru.jp/wp-content/img/ogp_top.jpg}
        NEXT_PUBLIC_ADSENSE_CLIENT: ${NEXT_PUBLIC_ADSENSE_CLIENT:-}
        NEXT_PUBLIC_ADSENSE_SLOT: ${NEXT_PUBLIC_ADSENSE_SLOT:-}
        NEXT_PUBLIC_ADSENSE_INFEED_SLOT: ${NEXT_PUBLIC_ADSENSE_INFEED_SLOT:-}
        NEXT_PUBLIC_ADSENSE_INFEED_LAYOUT_KEY: ${NEXT_PUBLIC_ADSENSE_INFEED_LAYOUT_KEY:-}
        NEXT_PUBLIC_ADSENSE_INFEED_INTERVAL: ${NEXT_PUBLIC_ADSENSE_INFEED_INTERVAL:-3}
        NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_1: ${NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_1:-}
        NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_2: ${NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_2:-}
        NEXT_PUBLIC_DYSHORTS_ID: ${NEXT_PUBLIC_DYSHORTS_ID:-}
    restart: unless-stopped
    expose:
      - '3000'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://mongo:27017/animemiru
      NODE_ENV: production
    volumes:
      - media_uploads:/app/public/media

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app

  # 移行・メンテ用: docker compose --profile tools run --rm tools npm run migrate:wp -- --all
  tools:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile.tools
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://mongo:27017/animemiru
      NODE_ENV: production
    volumes:
      - media_uploads:/app/public/media
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  media_uploads:
  certbot_www:
