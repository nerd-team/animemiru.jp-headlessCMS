# main ブランチへの push で VPS に自動デプロイ
# 初回設定: GitHub リポジトリ → Settings → Secrets and variables → Actions
#   VPS_HOST      = 153.120.2.184
#   VPS_USER      = ubuntu
#   VPS_SSH_KEY   = VPS用の秘密鍵（全文）
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd ~/animemiru.jp-headlessCMS
            git pull origin main
            sudo docker compose up -d --build
            sudo docker compose ps
